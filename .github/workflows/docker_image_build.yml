# Use hotosm workflow immage build fors pushes to main or release branches
name: Image Build

on:
  push:
    branches:
      - 'main'
      - 'staging'
      - 'dev'
      - 'release/*'

jobs:
  build:
    uses: hotosm/gh-workflows/.github/workflows/image_build.yml@4.0.1
    secrets: inherit
    with:
      image_name: ghcr.io/${{ github.repository }}
      build_target: prod
      # FIXME important to enable this once wagtail is upgraded...
      scan_image: false
