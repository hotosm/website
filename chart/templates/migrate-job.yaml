{{- if .Values.migrationJob.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "django.fullname" . }}-migrate
  labels:
    {{- include "django.labels" . | nindent 4 }}
  annotations:
    # Ordered via sync-waves rather than PreSync hook: the ServiceAccount lives
    # in the Sync phase (wave 0), so a PreSync hook can't reference it. Running
    # the Job as a Sync resource at wave 1 lets it use the SA, and the
    # Deployment at wave 2 waits for the Job to reach Healthy (== complete).
    # Force+Replace deletes and recreates the Job on each sync - required
    # because Job.spec.selector is auto-generated and immutable, so a plain
    # `kubectl replace` (Replace=true alone) fails on the second sync.
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: Force=true,Replace=true
    tag: "{{ .Values.image.tag }}"
spec:
  activeDeadlineSeconds: {{ default 900 .Values.migrationJob.activeDeadlineSeconds }}
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migrate-job
        {{- include "django.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "django.serviceAccountName" . }}
      restartPolicy: Never
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate-job
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # K8s `command` overrides the image ENTRYPOINT, so the Job runs
          # `manage.py migrate` directly without invoking container-entrypoint.sh.
          command: {{ .Values.migrationJob.command | toJson }}
          {{- if .Values.migrationJob.resources }}
          resources:
            {{- toYaml .Values.migrationJob.resources | nindent 12 }}
          {{- end }}
          {{- if .Values.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          {{- end }}
          {{- if or .Values.env .Values.postgres.enabled }}
          env:
            {{- if .Values.postgres.enabled }}
            {{- include "django.postgresDatabaseUrlEnv" . | nindent 12 }}
            {{- end }}
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- end }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
