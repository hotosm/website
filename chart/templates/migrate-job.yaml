{{- if .Values.migrationJob.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "django.fullname" . }}-migrate
  labels:
    {{- include "django.labels" . | nindent 4 }}
  annotations:
    # ArgoCD-native hooks (replaces Helm lifecycle hooks). PreSync runs before
    # the main Deployment is applied; sync-wave gives explicit ordering if other
    # PreSync resources get added later.
    argocd.argoproj.io/hook: PreSync
    # BeforeHookCreation clears a stuck/failed Job from a previous sync so the
    # new one can be created with the same name; HookSucceeded then tidies up
    # after a clean run (failed Jobs are kept for debugging).
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
    tag: "{{ .Values.image.tag }}"
spec:
  activeDeadlineSeconds: {{ default 900 .Values.migrationJob.activeDeadlineSeconds }}
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migrate-job
        {{- include "django.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "django.serviceAccountName" . }}
      restartPolicy: Never
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate-job
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # K8s `command` overrides the image ENTRYPOINT, so the Job runs
          # `manage.py migrate` directly without invoking container-entrypoint.sh.
          command: {{ .Values.migrationJob.command | toJson }}
          {{- if .Values.migrationJob.resources }}
          resources:
            {{- toYaml .Values.migrationJob.resources | nindent 12 }}
          {{- end }}
          {{- if .Values.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          {{- end }}
          {{- if .Values.env }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- end }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
