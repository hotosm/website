{{- if .Values.superuserJob.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "django.fullname" . }}-superuser
  labels:
    {{- include "django.labels" . | nindent 4 }}
  annotations:
    # ArgoCD-native hooks (replaces Helm lifecycle hooks). PostSync runs after
    # the Deployment is healthy. The job itself is idempotent - disabled by
    # default; flip superuserJob.enabled when bootstrapping a new environment.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "1"
    tag: "{{ .Values.image.tag }}"
spec:
  activeDeadlineSeconds: {{ default 300 .Values.superuserJob.activeDeadlineSeconds }}
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/component: superuser-job
        {{- include "django.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "django.serviceAccountName" . }}
      restartPolicy: Never
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: superuser-job
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # K8s `command` overrides the image ENTRYPOINT so only this script runs.
          command:
            - python
            - manage.py
            - shell
            - -c
            - |
              import os
              from django.contrib.auth import get_user_model
              User = get_user_model()
              username = os.environ["DJANGO_SUPERUSER_USERNAME"]
              email = os.environ.get("DJANGO_SUPERUSER_EMAIL", "")
              password = os.environ["DJANGO_SUPERUSER_PASSWORD"]
              if User.objects.filter(username=username).exists():
                  print(f"Superuser already exists: {username}")
              else:
                  User.objects.create_superuser(username, email, password)
                  print(f"Superuser created: {username}")
          {{- if .Values.superuserJob.resources }}
          resources:
            {{- toYaml .Values.superuserJob.resources | nindent 12 }}
          {{- end }}
          {{- if .Values.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          {{- end }}
          {{- if or .Values.env .Values.postgres.enabled }}
          env:
            {{- if .Values.postgres.enabled }}
            {{- include "django.postgresDatabaseUrlEnv" . | nindent 12 }}
            {{- end }}
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- end }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
