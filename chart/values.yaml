image:
  repository: ghcr.io/hotosm/website
  tag: main
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

migrationJob:
  enabled: true
  command: ["python", "manage.py", "migrate"]
  activeDeadlineSeconds: 900
  resources:
    limits: {}
    requests: {}

# Name of an existing Kubernetes Secret to load as env vars (via envFrom).
# The secret should contain keys like DATABASE_URL, SECRET_KEY, etc.
existingSecret: ""

# Plain (non-secret) environment variables added directly to the deployment
# and migration job.
env: {}
  # ENV: production
  # ALLOWED_HOSTS: "example.com"
  # AWS_STORAGE_BUCKET_NAME: "my-bucket"
  # AWS_S3_REGION_NAME: "us-east-1"

extraVolumeMounts: []
extraVolumes: []

web:
  replicaCount: 1
  port: 8080
  args: []
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 80
    # targetMemory: 80
  budget:
    minAvailable: 1 # Ignored when replicaCount is 1
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  podAnnotations: {}
  affinity: {}
  livenessProbe:
    failureThreshold: 5
    initialDelaySeconds: 5
    timeoutSeconds: 2
    path: "/"
  readinessProbe:
    failureThreshold: 10
    initialDelaySeconds: 5
    timeoutSeconds: 2
    path: "/"
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: true
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    hosts:
      - host: website.localhost
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""
