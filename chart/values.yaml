image:
  repository: ghcr.io/hotosm/website
  tag: main
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

migrationJob:
  enabled: true
  # Bypasses the image entrypoint so only the migrate step runs.
  command: ["python", "manage.py", "migrate", "--noinput"]
  activeDeadlineSeconds: 3600
  resources:
    limits: {}
    requests: {}

# Bootstraps a Django superuser as an ArgoCD PostSync hook. Disabled by
# default - flip to true only for initial bootstrap of a new environment,
# then set back to false. Requires DJANGO_SUPERUSER_USERNAME /
# DJANGO_SUPERUSER_PASSWORD (and optionally DJANGO_SUPERUSER_EMAIL) in
# `existingSecret`.
superuserJob:
  enabled: false
  activeDeadlineSeconds: 300
  resources:
    limits: {}
    requests: {}

# Kubernetes Secret loaded as env vars via envFrom. Must contain at least
# SECRET_KEY, DATABASE_URL, MAPBOX_ACCESS_TOKEN; typically also
# AWS_STORAGE_BUCKET_NAME / AWS_S3_REGION_NAME / AWS_ACCESS_KEY_ID /
# AWS_SECRET_ACCESS_KEY / SENTRY_DSN / DEEPL_KEY.
existingSecret: hot-website-secret-env

# Plain (non-secret) environment variables added directly to the deployment
# and migration job.
env:
  DJANGO_SETTINGS_MODULE: hot_osm.settings.production
  # `localhost` must stay in this list - kubelet probes send `Host: localhost`
  # via the probe httpHeaders config below.
  ALLOWED_HOSTS: "website.hotosm.org,hotosm.org,www.hotosm.org,localhost"

extraVolumeMounts: []
extraVolumes: []

# Pod-level security context applied to web Deployment and migration Job.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

web:
  replicaCount: 2
  port: 8000
  args: []
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 80
    # targetMemory: 80
  budget:
    minAvailable: 1
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  podAnnotations: {}
  affinity: {}
  livenessProbe:
    failureThreshold: 5
    initialDelaySeconds: 15
    timeoutSeconds: 2
    path: "/__lbheartbeat__"
    # Host header sent to the app; must be in ALLOWED_HOSTS.
    host: "localhost"
  readinessProbe:
    failureThreshold: 10
    initialDelaySeconds: 5
    timeoutSeconds: 2
    path: "/__lbheartbeat__"
    host: "localhost"
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      external-dns.alpha.kubernetes.io/hostname: website.hotosm.org
      external-dns.alpha.kubernetes.io/ttl: "300"
      nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    hosts:
      - host: website.hotosm.org
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: hot-website-tls
        hosts:
          - website.hotosm.org

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""
